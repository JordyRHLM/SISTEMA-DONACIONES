version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_donaciones
    environment:
      POSTGRES_DB: donacion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: springboot_donaciones
    depends_on:
      - db
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/donacion
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    restart: always
    entrypoint: ["sh", "-c", "sleep 20 && java -jar app.jar"]

volumes:
  db_data:
