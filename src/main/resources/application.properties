# Configuración básica de la aplicación
spring.application.name=donaciones
server.port=8091

# Configuración de la base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/donacion
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Configuración para manejo de errores
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Configuración básica de caché (sin Redis por ahora)
spring.cache.type=simple

# Configuración de Spring Session (si la necesitas)
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=30m

# Configuración JWT (simplificada)
app.jwtSecret=YjY4ZDRjZTlkZTczNjc0MmU4ZDAxZTYyNGQ0YTMzYjI4ZTQ0Zjg0Njg1MTc5N2E2Zjc3YjYxNzg4OTUyZjA2OA==
app.jwtExpirationMs=86400000

# Configuración Swagger/OpenAPI (documentación API)
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html